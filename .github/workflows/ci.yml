name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
      - 'docs/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 修正条件：PR 不再依赖 head_commit，手动触发直接通过
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, '[skip ci]'))
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,x86_64-linux-android,armv7-linux-androideabi,i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: app/src/main/rust/wekit-native -> target

      - name: Cache Gradle build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt install -y gcc-multilib

      - name: Decode keystore (push to master)
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/wekit-keystore.jks

      - name: Build Release (Signed / Unsigned)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEKIT_KEYSTORE_FILE: ${{ runner.temp }}/wekit-keystore.jks
          WEKIT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          WEKIT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          WEKIT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --warning-mode all --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: wekit-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v7
        with:
          name: wekit-mapping
          path: app/build/outputs/mapping/release/mapping.txt

  release-ci:
    needs: build
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: wekit-apk
          path: artifacts

      - name: Delete existing CI release (clean update)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete CI --yes || true
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/CI || true

      - name: Generate update.json
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          GIT_HASH=$(git rev-parse --short HEAD)
          cat > artifacts/update.json <<EOF
          {
            "versionCode": ${COMMIT_COUNT},
            "versionName": "git+${GIT_HASH}",
            "commit": "${GIT_HASH}"
          }
          EOF

      - name: Create CI release and upload APK
        uses: softprops/action-gh-release@v4
        with:
          tag_name: CI
          name: CI
          body: |
            本 Release 始终包含最新的 CI 构建产物
            
            提交 SHA: `${{ github.sha }}`
            提交消息:
